# ============================================
# Juicity-RS Build & Release CI
# ============================================
# Supported platforms:
#   Linux  (glibc and musl, zigbuild): x86_64, aarch64, i686, armv7, riscv64gc, loongarch64
#   Windows gnullvm (static): x86_64, aarch64  (via MSYS2 CLANG64/CLANGARM64)
#   macOS        (native)  : x86_64, aarch64
#   FreeBSD      (cross)   : x86_64
# ============================================

name: Build & Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------
  # Linux — zigbuild
  # --------------------------------------------------
  linux:
    name: Linux (${{ matrix.target }})${{ contains(matrix.target, 'x86_64') && format(' - {0}', matrix.cpu_variant) || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - i686-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - riscv64gc-unknown-linux-gnu
          - loongarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - i686-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
          - riscv64gc-unknown-linux-musl
          - loongarch64-unknown-linux-musl
        include:
          - target: x86_64-unknown-linux-gnu
            cpu_variant: v1
          - target: x86_64-unknown-linux-gnu
            cpu_variant: v2
          - target: x86_64-unknown-linux-gnu
            cpu_variant: v3
          - target: x86_64-unknown-linux-musl
            cpu_variant: v1
          - target: x86_64-unknown-linux-musl
            cpu_variant: v2
          - target: x86_64-unknown-linux-musl
            cpu_variant: v3
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build with zigbuild
        env:
          RUSTFLAGS: ${{ matrix.cpu_variant == 'v3' && '-C target-cpu=x86-64-v3' || matrix.cpu_variant == 'v2' && '-C target-cpu=x86-64-v2' || '' }}
        run: cargo zigbuild --workspace --release --target ${{ matrix.target }} --exclude juicity-gui

      - name: Prepare package
        shell: bash
        run: |
          case "${{ matrix.cpu_variant }}" in
            v1) PKG_NAME="juicity-${{ matrix.target }}" ;;
            v2) PKG_NAME="juicity-${{ matrix.target }}-v2" ;;
            v3) PKG_NAME="juicity-${{ matrix.target }}-v3" ;;
            *)  PKG_NAME="juicity-${{ matrix.target }}" ;;
          esac
          mkdir -p "${PKG_NAME}"
          cp "target/${{ matrix.target }}/release/juicity-client" "${PKG_NAME}/"
          cp "target/${{ matrix.target }}/release/juicity-server" "${PKG_NAME}/"
          cp client/examples/config.json "${PKG_NAME}/client-config.json"
          cp server/examples/config.json "${PKG_NAME}/server-config.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: juicity-${{ matrix.target }}${{ contains(matrix.target, 'x86_64') && matrix.cpu_variant != 'v1' && format('-{0}', matrix.cpu_variant) || '' }}
          path: juicity-${{ matrix.target }}${{ contains(matrix.target, 'x86_64') && matrix.cpu_variant != 'v1' && format('-{0}', matrix.cpu_variant) || '' }}

  # --------------------------------------------------
  # Windows gnullvm — static compile via MSYS2
  # --------------------------------------------------
  windows-gnullvm:
    name: Windows gnullvm (${{ matrix.target }})${{ contains(matrix.target, 'x86_64') && format(' - {0}', matrix.cpu_variant) || '' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-gnullvm
            runner: windows-latest
            msystem: CLANG64
            cpu_variant: v1
          - target: x86_64-pc-windows-gnullvm
            runner: windows-latest
            msystem: CLANG64
            cpu_variant: v2
          - target: x86_64-pc-windows-gnullvm
            runner: windows-latest
            msystem: CLANG64
            cpu_variant: v3
          - target: aarch64-pc-windows-gnullvm
            runner: windows-11-arm
            msystem: CLANGARM64
    steps:
      - uses: actions/checkout@v6

      - name: Install MSYS2 toolchain (gnullvm)
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            mingw-w64-${{ matrix.msystem == 'CLANG64' && 'clang-x86_64' || 'clang-aarch64' }}-clang
            mingw-w64-${{ matrix.msystem == 'CLANG64' && 'clang-x86_64' || 'clang-aarch64' }}-lld
            mingw-w64-${{ matrix.msystem == 'CLANG64' && 'clang-x86_64' || 'clang-aarch64' }}-llvm
            mingw-w64-${{ matrix.msystem == 'CLANG64' && 'clang-x86_64' || 'clang-aarch64' }}-rust

      - name: Build
        shell: msys2 {0}
        env:
          RUSTFLAGS: -C target-feature=+crt-static ${{ matrix.cpu_variant == 'v3' && '-C target-cpu=x86-64-v3' || matrix.cpu_variant == 'v2' && '-C target-cpu=x86-64-v2' || '' }}
        run: cargo build --workspace --release --target ${{ matrix.target }} --exclude juicity-gui

      - name: Prepare package
        shell: msys2 {0}
        run: |
          case "${{ matrix.cpu_variant }}" in
            v1) PKG_NAME="juicity-${{ matrix.target }}" ;;
            v2) PKG_NAME="juicity-${{ matrix.target }}-v2" ;;
            v3) PKG_NAME="juicity-${{ matrix.target }}-v3" ;;
            *)  PKG_NAME="juicity-${{ matrix.target }}" ;;
          esac
          mkdir -p "${PKG_NAME}"
          cp "target/${{ matrix.target }}/release/juicity-client.exe" "${PKG_NAME}/"
          cp "target/${{ matrix.target }}/release/juicity-server.exe" "${PKG_NAME}/"
          cp client/examples/config.json "${PKG_NAME}/client-config.json"
          cp server/examples/config.json "${PKG_NAME}/server-config.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: juicity-${{ matrix.target }}${{ contains(matrix.target, 'x86_64') && matrix.cpu_variant != 'v1' && format('-{0}', matrix.cpu_variant) || '' }}
          path: juicity-${{ matrix.target }}${{ contains(matrix.target, 'x86_64') && matrix.cpu_variant != 'v1' && format('-{0}', matrix.cpu_variant) || '' }}
          if-no-files-found: error

  # --------------------------------------------------
  # macOS — native build
  # --------------------------------------------------
  macos:
    name: macOS (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-26-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }} --exclude juicity-gui

      - name: Prepare package
        shell: bash
        run: |
          PKG_NAME="juicity-${{ matrix.target }}"
          mkdir -p "${PKG_NAME}"
          cp "target/${{ matrix.target }}/release/juicity-client" "${PKG_NAME}/"
          cp "target/${{ matrix.target }}/release/juicity-server" "${PKG_NAME}/"
          cp client/examples/config.json "${PKG_NAME}/client-config.json"
          cp server/examples/config.json "${PKG_NAME}/server-config.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: juicity-${{ matrix.target }}
          path: juicity-${{ matrix.target }}
          if-no-files-found: error

  # --------------------------------------------------
  # FreeBSD — cross build via actions-rust-cross
  # --------------------------------------------------
  freebsd:
    name: FreeBSD x86_64${{ format(' - {0}', matrix.cpu_variant) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-freebsd
            cpu_variant: v1
          - target: x86_64-unknown-freebsd
            cpu_variant: v2
          - target: x86_64-unknown-freebsd
            cpu_variant: v3
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-unknown-freebsd

      - name: Build (cross)
        uses: houseabsolute/actions-rust-cross@v1
        env:
          RUSTFLAGS: ${{ matrix.cpu_variant == 'v3' && '-C target-cpu=x86-64-v3' || matrix.cpu_variant == 'v2' && '-C target-cpu=x86-64-v2' || '' }}
        with:
          command: build
          target: x86_64-unknown-freebsd
          args: "--release --workspace --exclude juicity-gui"

      - name: Prepare package
        shell: bash
        run: |
          case "${{ matrix.cpu_variant }}" in
            v1) PKG_NAME="juicity-${{ matrix.target }}" ;;
            v2) PKG_NAME="juicity-${{ matrix.target }}-v2" ;;
            v3) PKG_NAME="juicity-${{ matrix.target }}-v3" ;;
            *)  PKG_NAME="juicity-${{ matrix.target }}" ;;
          esac
          mkdir -p "${PKG_NAME}"
          cp "target/x86_64-unknown-freebsd/release/juicity-client" "${PKG_NAME}/" || true
          cp "target/x86_64-unknown-freebsd/release/juicity-server" "${PKG_NAME}/" || true
          cp client/examples/config.json "${PKG_NAME}/client-config.json"
          cp server/examples/config.json "${PKG_NAME}/server-config.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: juicity-${{ matrix.target }}${{ contains(matrix.target, 'x86_64') && matrix.cpu_variant != 'v1' && format('-{0}', matrix.cpu_variant) || '' }}
          path: juicity-${{ matrix.target }}${{ contains(matrix.target, 'x86_64') && matrix.cpu_variant != 'v1' && format('-{0}', matrix.cpu_variant) || '' }}
          if-no-files-found: error

  # --------------------------------------------------
  # Release — attach all artifacts to GitHub Release
  # --------------------------------------------------
  release:
    name: Attach to Release
    if: github.event_name == 'release' && github.event.action == 'published'
    needs:
      - linux
      - windows-gnullvm
      - macos
      - freebsd
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Compress artifacts into zip files
        shell: bash
        run: |
          shopt -s globstar
          for dir in artifacts/*/; do
            target_name=$(basename "$dir")
            zipfile="artifacts/${target_name}.zip"
            echo "Creating zip: $zipfile from $dir"
            (cd "$dir" && zip -r "../../${zipfile}" .)
          done
          
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          shopt -s globstar
          for zipfile in artifacts/**/*.zip; do
            echo "Uploading: $zipfile"
            gh release upload "${{ github.event.release.tag_name }}" "$zipfile" --clobber -R "$GH_REPO"
          done
